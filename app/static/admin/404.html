<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .float-animation {
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-50 to-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md fade-in">
        <!-- Error Card -->
        <div class="bg-white rounded-lg shadow-lg overflow-hidden">
            <!-- Header Section -->
            <div class="bg-gradient-to-r from-orange-500 to-orange-600 px-8 py-12">
                <div class="text-center">
                    <div class="inline-flex items-center justify-center w-20 h-20 bg-white rounded-full mb-4 float-animation">
                        <span class="text-5xl font-bold text-orange-600">404</span>
                    </div>
                </div>
            </div>

            <!-- Content Section -->
            <div class="px-8 py-8">
                <div class="text-center">
                    <h1 class="text-2xl font-bold text-gray-900 mb-2">Page Not Found</h1>
                    <p class="text-gray-600 mb-6">
                        The page you're looking for doesn't exist or has been moved. Let's get you back on track.
                    </p>

                    <!-- Illustration -->
                    <div class="mb-8">
                        <svg class="w-32 h-32 mx-auto text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                    </div>

                    <!-- Action Buttons -->
                    <div class="space-y-3">
                        <a
                            href="/admin"
                            class="block w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-lg transition duration-200"
                        >
                            Go to Admin Panel
                        </a>
                        <a
                            href="/admin/login"
                            class="block w-full bg-gray-200 hover:bg-gray-300 text-gray-800 font-medium py-2.5 rounded-lg transition duration-200"
                        >
                            Back to Login
                        </a>
                    </div>
                </div>
            </div>

            <!-- Footer -->
            <div class="bg-gray-50 px-8 py-4 border-t border-gray-200">
                <p class="text-xs text-gray-600 text-center">
                    Error Code: 404 | Page Not Found
                </p>
            </div>
        </div>

        <!-- Help Text -->
        <div class="mt-6 text-center text-sm text-gray-600">
            <p>If you believe this is an error, please contact support.</p>
        </div>
    </div>
</body>
</html>
